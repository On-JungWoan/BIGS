name: Close inactive issues
on:
  schedule:
    - cron: "10 14 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 14
          days-before-issue-close: 0
          stale-issue-label: "not-activated"
          stale-issue-message: "This issue was closed because it has been open for 14 days with no activity."
          days-before-pr-stale: -1
          days-before-pr-close: -1
          repo-token: ${{ secrets.GITHUB_TOKEN }}